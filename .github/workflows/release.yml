name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 阶段 1：创建 Draft Release，输出 release-id 供后续 job 使用 ──
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.releaseId }}
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        id: create
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.tag_name }}
          releaseName: 'Skills Manager ${{ steps.tag.outputs.tag_name }}'
          releaseBody: 'See changelog for details.'
          releaseDraft: true
          prerelease: false

  # ── 阶段 2：6 个 job 并行构建，全部上传到同一个 Release ──
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (.dmg / .app)
          - os: macos-latest
            target: aarch64-apple-darwin

          # macOS x86_64 (.dmg / .app)
          - os: macos-latest
            target: x86_64-apple-darwin

          # Windows x64 (.exe / .msi)
          - os: windows-latest
            target: x86_64-pc-windows-msvc

          # Windows ARM64 (.exe / .msi)
          - os: windows-latest
            target: aarch64-pc-windows-msvc

          # Linux x86_64 (.AppImage / .deb)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          # Linux ARM64 (.AppImage / .deb) — 需要 GitHub Team/Enterprise
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: pnpm install

      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
