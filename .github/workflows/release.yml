name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (.dmg / .app)
          - os: macos-latest
            target: aarch64-apple-darwin

          # macOS x86_64 (.dmg / .app)
          - os: macos-latest
            target: x86_64-apple-darwin

          # Windows x64 (.exe / .msi)
          - os: windows-latest
            target: x86_64-pc-windows-msvc

          # Windows ARM64 (.exe / .msi)  — MSVC ARM64 已预装在 windows-latest runner
          - os: windows-latest
            target: aarch64-pc-windows-msvc

          # Linux x86_64 (.AppImage / .deb)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          # Linux ARM64 (.AppImage / .deb)  — 原生 ARM runner，私有仓库需 GitHub Team/Enterprise
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Skills Manager ${{ github.ref_name }}'
          releaseBody: 'See changelog for details.'
          releaseDraft: true
          prerelease: false
